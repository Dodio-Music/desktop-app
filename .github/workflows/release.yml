name: release.yml
on:
    push:
        tags:
            - "v*"

permissions:
    contents: write

jobs:

    build-windows:
        name: Build Windows Installer
        runs-on: windows-latest
        env:
            GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

        steps:
            -   name: Checkout repository
                uses: actions/checkout@v4

            -   name: Setup Node
                uses: actions/setup-node@v4
                with:
                    node-version-file: ".nvmrc"
                    cache: npm

            -   name: Install dependencies
                run: npm ci

            -   name: Build project
                run: npm run build

            -   name: Package and publish Windows release
                run: npm run dist:win -- --publish always

    build-linux:
        name: Build Linux AppImage
        runs-on: ubuntu-latest
        env:
            GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

        steps:
            -   name: Checkout repository
                uses: actions/checkout@v4

            -   name: Setup Node
                uses: actions/setup-node@v4
                with:
                    node-version-file: ".nvmrc"
                    cache: npm

            -   name: Install dependencies
                run: npm ci

            -   name: Build project
                run: npm run build

            -   name: Package and publish Linux release
                run: npm run dist:linux -- --publish always
